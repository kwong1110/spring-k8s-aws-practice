apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-deployment
  namespace: lgcns

spec:
  # 자원공간의 제한 - 낭비 방지, 관리 편의성 제공해주는 옵션
  revisionHistoryLimit: 2
  replicas: 2
  selector:
    matchLabels:
      app: order-pod

  # pod 관리
  template:
    metadata:
      labels:
        app: order-pod
    spec:
      # docker container
      containers:
        - name: order-container
          # NOTE ECR의 경로
          image: 512138915880.dkr.ecr.us-east-1.amazonaws.com/lgcns-kwang:latest
          ports:
            - containerPort: 8080

          # NOTE k8s-secret 에 설정한 정보를 외부변수로 application.yml에 전달
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: lgcns-app-secrets
                  key: DB_HOST

            - name: DB_ADMIN
              valueFrom:
                secretKeyRef:
                  name: lgcns-app-secrets
                  key: DB_ADMIN

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lgcns-app-secrets
                  key: DB_PASSWORD

---
# core service setting
# core group : pod, service, ConfigMap, Secret, namespace
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: lgcns
spec:
  type: ClusterIP
  selector:
    # pod의 labels/app 과 이름이 일치해야함.
    app: order-pod
  ports:
    # Service의 port
    - port: 80
      # Pod(nginx)의 port
      targetPort: 8080
