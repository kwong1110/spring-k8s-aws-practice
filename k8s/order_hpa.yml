# pod 상태 확인을 위한 metric-server를 cluster내에 설치하는 작업
# kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/download/v0.6.3/components.yaml

apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler

metadata:
  name: orders-backend-hpa
  namespace: lgcns

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-deployment

  # pod autoscaling
  # minReplicas: 2
  # maxReplicas: 4
  # targetCPUUtilizationPercentage: 50

  # ec2 autoscaling
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 30

# hpa 통해서 pod 현황 파악을 하고 싶다면?
# kubectl get hpa orders-backend-hpa -n lgcns -w

# 부하테스트를 위해서 특정 pod 접속
# kubectl get pod -n lgcns
# kubectl exec -it xxxxxxxx -n lgcns -- sh
