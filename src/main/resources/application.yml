# ! cloud
# aws - ecr image
server:
  forward-headers-strategy: framework

spring:
  application:
    name: monolithic-k8s-aws
  datasource:
    # ${} 외부변수값은 k8s - secret 생성하여 pod 실행 시 주입 할 예정!
    driver-class-name: org.mariadb.jdbc.Driver
    # ! url, username, password -> k8s secret에서 관리.
    url: jdbc:mariadb://${DB_HOST}:3306/inspire?useSSL=true&requireSSL=true
    username: ${DB_ADMIN}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      # ddl-auto: validate
      ddl-auto: create
    # 콘솔출력
    show-sql: true
    properties:
      hibernate:
        # h2
        # dialect: org.hibernate.dialect.H2Dialect
        # mariadb
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

  # redis
  # redis 실행
  # docker run -d --name redis-container -p 6379:6379 redis:7.2
  # redis 실행 확인
  # docker exec -it redis-container redis-cli
  # ping
  # 브라우저에서 redis 확인
  # docker run -d --name redis-insight -p 8001:5540 redis/redisinsight:latest
  # http://localhost:8001
  # Host: redis 또는 host.docker.internal , port: 6379

  data:
    redis:
      # host 설정은 order_redis.yml 서비스 이름으로 변경
      host: redis-service
      port: 6379
      password:
      timeout: 6000ms

